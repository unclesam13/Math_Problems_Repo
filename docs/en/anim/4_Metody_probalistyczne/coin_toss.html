<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Toss Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0f0f14;
    color: #e8e4d9;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    text-align: center;
    color: #f0c96e;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .btn {
    background: transparent;
    border: 1.5px solid #f0c96e;
    color: #f0c96e;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn:hover { background: #f0c96e; color: #0f0f14; }
  .btn.active { background: #f0c96e; color: #0f0f14; }

  .coins-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    min-height: 100px;
    align-items: center;
  }

  .coin-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  .coin {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    border: 3px solid #f0c96e;
    background: #1a1a24;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .coin.spinning {
    animation: spin 0.5s ease-out;
  }
  .coin.heads { background: linear-gradient(135deg, #2a2010, #1a1a24); border-color: #f0c96e; }
  .coin.tails { background: linear-gradient(135deg, #102a20, #1a1a24); border-color: #6ef0c9; }

  .coin-label {
    font-size: 0.65rem;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .coin-result {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .coin-result.heads { color: #f0c96e; }
  .coin-result.tails { color: #6ef0c9; }

  @keyframes spin {
    0% { transform: rotateY(0deg) scale(0.8); }
    50% { transform: rotateY(900deg) scale(1.1); }
    100% { transform: rotateY(1800deg) scale(1); }
  }

  .outcome-box {
    background: #16161e;
    border: 1px solid #2a2a3a;
    padding: 14px 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .outcome-label { font-size: 0.65rem; color: #666; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .outcome-value { font-size: 1.1rem; color: #e8e4d9; letter-spacing: 0.15em; }

  .space-display {
    background: #16161e;
    border: 1px solid #2a2a3a;
    padding: 14px 20px;
    margin-bottom: 16px;
  }
  .space-display .space-label {
    font-size: 0.65rem; color: #666; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
  }
  .space-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .space-item {
    font-size: 0.72rem;
    padding: 3px 8px;
    border: 1px solid #2a2a3a;
    color: #aaa;
    transition: all 0.3s;
  }
  .space-item.highlighted {
    border-color: #f0c96e;
    color: #f0c96e;
    background: rgba(240,201,110,0.08);
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: #16161e;
    border: 1px solid #2a2a3a;
    padding: 10px;
    text-align: center;
  }
  .stat-num { font-size: 1.2rem; font-weight: 700; color: #f0c96e; }
  .stat-lbl { font-size: 0.6rem; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

  .history {
    background: #16161e;
    border: 1px solid #2a2a3a;
    padding: 10px 14px;
    max-height: 80px;
    overflow-y: auto;
    font-size: 0.7rem;
    color: #555;
    line-height: 1.8;
    word-break: break-all;
  }
  .history span.h { color: #f0c96e; }
  .history span.t { color: #6ef0c9; }

  .toss-count-btn {
    font-size: 0.7rem;
    padding: 6px 12px;
  }
  .divider { width: 100%; height: 1px; background: #2a2a3a; margin: 4px 0; }
</style>
</head>
<body>

<h2> Coin Toss Simulator</h2>

<div class="controls">
  <button class="btn active" id="btn1" onclick="setMode(1)">1 Toss (Ω₁)</button>
  <button class="btn" id="btn2" onclick="setMode(2)">2 Tosses (Ω₂)</button>
  <button class="btn" id="btn3" onclick="setMode(3)">3 Tosses (Ω₃)</button>
</div>

<div class="coins-row" id="coins"></div>

<div class="outcome-box">
  <div class="outcome-label">Current Outcome</div>
  <div class="outcome-value" id="currentOutcome">—</div>
</div>

<div class="space-display">
  <div class="space-label">Sample Space Ω<span id="omegaIdx">1</span> — highlighted = current outcome</div>
  <div class="space-grid" id="spaceGrid"></div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-num" id="totalTosses">0</div><div class="stat-lbl">Total Tosses</div></div>
  <div class="stat-box"><div class="stat-num" id="headsCount">0</div><div class="stat-lbl">Heads (H)</div></div>
  <div class="stat-box"><div class="stat-num" id="tailsCount">0</div><div class="stat-lbl">Tails (T)</div></div>
</div>

<div class="controls" style="margin-bottom:10px;">
  <button class="btn toss-count-btn" onclick="toss()">Toss Once</button>
  <button class="btn toss-count-btn" onclick="tossMany(100)">Toss ×100</button>
  <button class="btn toss-count-btn" onclick="tossMany(1000)">Toss ×1000</button>
  <button class="btn toss-count-btn" onclick="resetStats()">Reset</button>
</div>

<div class="history" id="history">History will appear here...</div>

<script>
  let mode = 1;
  let totalTosses = 0, headsCount = 0, tailsCount = 0;
  let historyItems = [];
  let lastOutcome = null;

  const spaces = {
    1: ['H','T'],
    2: ['HH','HT','TH','TT'],
    3: ['HHH','HHT','HTH','HTT','THH','THT','TTH','TTT']
  };

  function setMode(n) {
    mode = n;
    document.querySelectorAll('.btn[id^=btn]').forEach(b => b.classList.remove('active'));
    document.getElementById('btn'+n).classList.add('active');
    document.getElementById('omegaIdx').textContent = n;
    renderCoins([]);
    renderSpace(null);
    document.getElementById('currentOutcome').textContent = '—';
    lastOutcome = null;
  }

  function renderCoins(results) {
    const row = document.getElementById('coins');
    row.innerHTML = '';
    for (let i = 0; i < mode; i++) {
      const r = results[i];
      const wrap = document.createElement('div');
      wrap.className = 'coin-wrap';
      const coin = document.createElement('div');
      coin.className = 'coin' + (r ? (r==='H' ? ' heads' : ' tails') : '');
      coin.id = 'coin'+i;
      coin.textContent = r ? (r==='H' ? 'H' : 'T') : '?';
      const lbl = document.createElement('div');
      lbl.className = 'coin-label';
      lbl.textContent = 'Toss '+(i+1);
      const res = document.createElement('div');
      res.className = 'coin-result' + (r ? (r==='H' ? ' heads' : ' tails') : '');
      res.textContent = r ? (r==='H' ? 'Heads' : 'Tails') : '';
      wrap.appendChild(coin);
      wrap.appendChild(lbl);
      wrap.appendChild(res);
      row.appendChild(wrap);
    }
  }

  function renderSpace(current) {
    const grid = document.getElementById('spaceGrid');
    grid.innerHTML = '';
    spaces[mode].forEach(item => {
      const el = document.createElement('div');
      el.className = 'space-item' + (item === current ? ' highlighted' : '');
      el.textContent = item;
      grid.appendChild(el);
    });
  }

  function toss() {
    const results = [];
    for (let i = 0; i < mode; i++) results.push(Math.random() < 0.5 ? 'H' : 'T');
    const outcome = results.join('');

    // animate
    renderCoins(Array(mode).fill(null));
    document.querySelectorAll('.coin').forEach(c => {
      c.classList.add('spinning');
      setTimeout(() => c.classList.remove('spinning'), 600);
    });
    setTimeout(() => {
      renderCoins(results);
      renderSpace(outcome);
      document.getElementById('currentOutcome').textContent = outcome;
      lastOutcome = outcome;
    }, 520);

    // stats (count individual coin results)
    totalTosses++;
    results.forEach(r => { if(r==='H') headsCount++; else tailsCount++; });
    updateStats();
    addHistory(outcome, results);
  }

  function tossMany(n) {
    for (let i = 0; i < n; i++) {
      const results = [];
      for (let j = 0; j < mode; j++) results.push(Math.random() < 0.5 ? 'H' : 'T');
      const outcome = results.join('');
      totalTosses++;
      results.forEach(r => { if(r==='H') headsCount++; else tailsCount++; });
      addHistory(outcome, results, true);
      if (i === n-1) {
        renderCoins(results);
        renderSpace(outcome);
        document.getElementById('currentOutcome').textContent = outcome;
      }
    }
    updateStats();
    renderHistoryDisplay();
  }

  function updateStats() {
    document.getElementById('totalTosses').textContent = totalTosses;
    const total = headsCount + tailsCount;
    document.getElementById('headsCount').textContent =
      headsCount + (total > 0 ? ' (' + (headsCount/total*100).toFixed(1)+'%)' : '');
    document.getElementById('tailsCount').textContent =
      tailsCount + (total > 0 ? ' (' + (tailsCount/total*100).toFixed(1)+'%)' : '');
  }

  function addHistory(outcome, results, batch=false) {
    historyItems.unshift(outcome);
    if (historyItems.length > 200) historyItems.pop();
    if (!batch) renderHistoryDisplay();
  }

  function renderHistoryDisplay() {
    const h = document.getElementById('history');
    h.innerHTML = historyItems.map(o =>
      o.split('').map(c => `<span class="${c==='H'?'h':'t'}">${c}</span>`).join('') + ' '
    ).join('');
  }

  function resetStats() {
    totalTosses = 0; headsCount = 0; tailsCount = 0;
    historyItems = [];
    renderCoins([]);
    renderSpace(null);
    document.getElementById('currentOutcome').textContent = '—';
    document.getElementById('history').innerHTML = 'History will appear here...';
    updateStats();
  }

  // init
  setMode(1);
</script>
</body>
</html>
