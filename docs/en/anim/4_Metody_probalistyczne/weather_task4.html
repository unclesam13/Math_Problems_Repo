<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive Weather Probability Model</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #eaf0f6;
  margin: 20px;
}

body.sunny {
  background: linear-gradient(#87ceeb, #e0f7ff);
  transition: 0.8s;
}

body.cloudy {
  background: linear-gradient(#b0b8c4, #e6e9ef);
  transition: 0.8s;
}

body.rainy {
  background: linear-gradient(#4a5a6a, #8aa0b3);
  transition: 0.8s;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 8px;
  justify-content: center;
  margin: 20px;
}

.cell {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  border: 1px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  background: white;
  user-select: none;
}

.header {
  background: transparent;
  border: none;
  cursor: default;
}

.active {
  background: #4CAF50;
  color: white;
}

.highlight {
  background: #ff9800 !important;
}

/* BUTTONS */
button {
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

/* OUTPUT */
.output {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 12px;
  display: inline-block;
}

/* ===================== */
/* 🌦 ANIMATED WEATHER   */
/* ===================== */

.weather {
  margin-top: 20px;
  height: 120px;
  position: relative;
}

/* ☀️ SUN */
.sun {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffeb3b, #ff9800);
  position: absolute;
  left: 30%;
  top: 20px;
  animation: spin 6s linear infinite;
  box-shadow: 0 0 30px #ffeb3b;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ☁️ CLOUD */
.cloud {
  width: 90px;
  height: 40px;
  background: #fff;
  border-radius: 50px;
  position: absolute;
  left: 45%;
  top: 40px;
  animation: float 4s ease-in-out infinite;
  box-shadow: 20px 10px 0 #fff, -20px 10px 0 #fff;
}

@keyframes float {
  0%,100% { transform: translateX(0); }
  50% { transform: translateX(20px); }
}

/* 🌧 RAIN */
.rain {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.drop {
  position: absolute;
  width: 2px;
  height: 15px;
  background: #2196f3;
  animation: fall 0.6s linear infinite;
}

@keyframes fall {
  from { transform: translateY(-20px); opacity: 1; }
  to { transform: translateY(120px); opacity: 0; }
}
</style>
</head>

<body>

<h2>🌦 Interactive Weather Probability Model</h2>

<div class="weather">
  <div class="sun"></div>
  <div class="cloud"></div>
  <div class="rain" id="rain"></div>
</div>

<div class="grid" id="grid"></div>

<div>
  <button onclick="setMode('sunny')">Sunny Mode ☀️</button>
  <button onclick="setMode('rainy')">Rainy Mode 🌧</button>
  <button onclick="setMode('cloudy')">Cloudy Mode ☁️</button>
  <button onclick="clearGrid()">Reset</button>
</div>

<div class="output">
  <p><b>Random Week:</b> <span id="randomWeek">-</span></p>
  <p><b>Probability:</b> <span id="prob">-</span></p>
  <button onclick="simulate()">Run Simulation</button>
</div>

<script>

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const states = ["S","C","R"];
const grid = document.getElementById("grid");

let mode = null;

// BUILD GRID
for (let r = 0; r < 4; r++) {
  for (let c = 0; c < 8; c++) {
    const div = document.createElement("div");
    div.classList.add("cell");

    if (r === 0 && c > 0) {
      div.innerText = days[c-1];
      div.classList.add("header");
    }
    else if (c === 0 && r > 0) {
      div.innerText = states[r-1];
      div.classList.add("header");
    }
    else if (r > 0 && c > 0) {
      div.dataset.row = r-1;
      div.dataset.col = c-1;

      // CLICK interaction
      div.onclick = () => {
        div.classList.toggle("active");
      };
    }

    grid.appendChild(div);
  }
}

/* ===================== */
/* MODE CONTROL          */
/* ===================== */

function setMode(type) {
  document.body.classList.remove("sunny","cloudy","rainy");
  document.body.classList.add(type);

  const rain = document.getElementById("rain");

  if (type === "sunny") {
    rain.style.display = "none";
    animateSun();
  }

  if (type === "cloudy") {
    rain.style.display = "none";
    animateCloud();
  }

  if (type === "rainy") {
    rain.style.display = "block";
    animateRain();
  }
}

/* WEATHER ANIMATIONS */
function animateRain() {
  const rain = document.getElementById("rain");
  rain.innerHTML = "";

  for (let i = 0; i < 60; i++) {
    let drop = document.createElement("div");
    drop.className = "drop";

    drop.style.left = Math.random() * 100 + "%";
    drop.style.animationDuration = (0.4 + Math.random() * 0.4) + "s";
    drop.style.opacity = Math.random();

    rain.appendChild(drop);
  }
}

function animateSun() {
  const sun = document.querySelector(".sun");
  sun.style.boxShadow = "0 0 60px #ffeb3b";

  setInterval(() => {
    let pulse = 30 + Math.sin(Date.now() / 500) * 10;
    sun.style.boxShadow = `0 0 ${pulse}px #ffeb3b`;
  }, 50);
}

function animateCloud() {
  const cloud = document.querySelector(".cloud");

  cloud.style.transform = "translateX(0px)";
  cloud.style.opacity = 1;

  setInterval(() => {
    cloud.style.transform =
      `translateX(${Math.sin(Date.now() / 1000) * 30}px)`;
  }, 50);
}

/* ===================== */
/* SIMULATION            */
/* ===================== */

function generateRandomWeek() {
  let week = [];
  for (let i = 0; i < 7; i++) {
    week.push(states[Math.floor(Math.random()*3)]);
  }
  return week;
}

function simulate() {
  let success = 0;
  let trials = 500;

  for (let i = 0; i < trials; i++) {
    let w = generateRandomWeek();

    // simple condition: at least 2 sunny days
    if (w.filter(x => x === "S").length >= 2) success++;
  }

  let prob = success / trials;

  let sample = generateRandomWeek();
  document.getElementById("randomWeek").innerText = sample.join(" ");
  document.getElementById("prob").innerText = prob.toFixed(3);

  highlight(sample);
}

/* ===================== */
/* HIGHLIGHT             */
/* ===================== */

function highlight(week) {
  document.querySelectorAll(".cell").forEach(c => c.classList.remove("highlight"));

  week.forEach((state, day) => {
    let row = states.indexOf(state);
    let cell = document.querySelector(`[data-row="${row}"][data-col="${day}"]`);
    if (cell) cell.classList.add("highlight");
  });
}

function clearGrid() {
  document.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("active","highlight");
  });
}

</script>

</body>
</html>
